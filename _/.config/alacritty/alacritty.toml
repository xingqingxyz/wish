[cursor.style]
shape = "Beam"
blinking = "On"

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
persist = false
mouse.enabled = true
binding = { key = "O", mods = "Control|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|go-pher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`\\\\]+|(/[^\\s/]+)+"

[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "CreateNewWindow"

[[keyboard.bindings]]
key = "T"
mods = "Alt|Shift"
command = { program = "sh", args = ["-c", '''
  if [ "$(alacritty msg get-config | jq .window.opacity)" != 1.0 ]; then
    alacritty msg config window.opacity=1.0
  else
    alacritty msg config window.opacity=0.5
  fi
'''] }

[[keyboard.bindings]]
key = "+"
mods = "Alt|Shift"
command = { program = "alacritty", args = [
  "msg",
  "create-window",
  "-T",
  "bash",
  "-e",
  "bash",
] }

[[keyboard.bindings]]
key = "Enter"
mods = "Alt"
action = "ToggleFullscreen"

[[keyboard.bindings]]
key = "F11"
action = "ToggleFullscreen"

[[mouse.bindings]]
mouse = "Right"
action = "Paste"

[mouse]
hide_when_typing = true

[terminal]
shell = "pwsh"
osc52 = "CopyPaste"

[font]
normal.family = "Jetbrains Mono"
size = 12

[window]
resize_increments = true
decorations = "None"
decorations_theme_variant = "Dark"

[window.dimensions]
columns = 120
lines = 35

[bell]
animation = "EaseOut"
color = "#111111"
duration = 216

[general]
import = ["~/p/wish/alacritty-theme/themes/tokyo_night_enhanced.toml"]
live_config_reload = true
